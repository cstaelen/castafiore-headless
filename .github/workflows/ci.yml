name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read
  security-events: write

jobs:
  lint:
    name: Lint
    uses: ./.github/workflows/_lint.yml

  scan:
    name: Scan
    uses: ./.github/workflows/_scan.yml
    permissions:
      contents: read
      security-events: write
    secrets: inherit
